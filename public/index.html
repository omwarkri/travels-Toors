<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>React App</title>

    <!-- ✅ AWS RUM Monitoring Script -->
    <script>
      (function() {
        try {
          const config = {
            sessionSampleRate: 1,
            endpoint: "https://dataplane.rum.eu-north-1.amazonaws.com",
            telemetries: ["performance", "errors", "http"],
            allowCookies: true,
            enableXRay: false,
            // set to false if you are using a public resource policy
            signing: true
          };

          const APPLICATION_ID = "7aa26bf4-f193-4b8f-8856-96a84ddc65ce";
          const APPLICATION_VERSION = "1.0.0";
          const APPLICATION_REGION = "eu-north-1";

          new AWS.RUM.Client(
            APPLICATION_ID,
            APPLICATION_VERSION,
            APPLICATION_REGION,
            config
          );
        } catch (error) {
          console.error("AWS RUM initialization failed:", error);
        }
      })();
    </script>

    <!-- ✅ Load AWS RUM SDK -->
    <script src="https://client.rum.us-east-1.amazonaws.com/1.11.1/cwr.js"></script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
